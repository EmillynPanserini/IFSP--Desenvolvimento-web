<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Dados Pessoais</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <main>
        <form action="#" method="post">
            <fieldset class="principal">
                <legend>Dados Pessoais</legend>

                <section class="lado-a-lado">
                    <fieldset class="interno">
                        <legend>Detalhes do Endereço</legend>

                        <p>
                            <label for="cidade">Cidade:</label>
                            <input type="text" id="cidade" name="cidade">
                        </p>

                        <p>
                            <label for="cep">CEP:</label>
                            <input type="text" id="cep" name="cep">
                        </p>
                    </fieldset>

                    <fieldset class="interno">
                        <legend>Detalhes do Telefone</legend>

                        <p>
                            <label for="residencial">Residencial:</label>
                            <input type="text" id="residencial" name="residencial">
                        </p>

                        <p>
                            <label for="celular">Celular:</label>
                            <input type="text" id="celular" name="celular">
                        </p>
                    </fieldset>
                </section>
            </fieldset>
        </form>
    </main>

</body>
</html>
