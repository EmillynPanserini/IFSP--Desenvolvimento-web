<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <main>
        <form action="#" method="post">

            <table>
                <tr>
                    <td colspan="2" class="titulo-claro">
                        Não é associado? Faça seu cadastro
                    </td>
                    <td colspan="2" class="titulo-escuro"></td>
                </tr>

                <tr>
                    <td><label for="nome">Nome</label></td>
                    <td colspan="3">
                        <input type="text" id="nome" name="nome">
                    </td>
                </tr>

                <tr>
                    <td><label for="nome-completo">Nome Completo</label></td>
                    <td colspan="3">
                        <input type="text" id="nome-completo" name="nome_completo">
                    </td>
                </tr>

                <tr>
                    <td><label for="cpf">CPF</label></td>
                    <td colspan="3">
                        <input type="text" id="cpf" name="cpf">
                    </td>
                </tr>

                <tr>
                    <td><label for="email">E-mail</label></td>
                    <td colspan="3">
                        <input type="email" id="email" name="email">
                    </td>
                </tr>

                <tr>
                    <td><label for="website">WebSite</label></td>
                    <td colspan="3">
                        <input type="url" id="website" name="website">
                    </td>
                </tr>

                <tr>
                    <td><label for="endereco">Endereço</label></td>
                    <td colspan="3">
                        <input type="text" id="endereco" name="endereco">
                    </td>
                </tr>

                <tr>
                    <td><label for="bairro">Bairro</label></td>
                    <td>
                        <input type="text" id="bairro" name="bairro">
                    </td>

                    <td><label for="cidade">Cidade</label></td>
                    <td>
                        <input type="text" id="cidade" name="cidade">
                    </td>
                </tr>

                <tr>
                    <td><label for="cep">Cep</label></td>
                    <td>
                        <input type="text" id="cep" name="cep">
                    </td>

                    <td><label for="uf">UF</label></td>
                    <td>
                        <select id="uf" name="uf">
                            <option value="AC">AC</option>
                            <option value="AL">AL</option>
                            <option value="AP">AP</option>
                            <option value="AM">AM</option>
                            <option value="BA" selected>BA</option>
                            <option value="CE">CE</option>
                            <option value="DF">DF</option>
                            <option value="ES">ES</option>
                            <option value="GO">GO</option>
                            <option value="MA">MA</option>
                            <option value="MT">MT</option>
                            <option value="MS">MS</option>
                            <option value="MG">MG</option>
                            <option value="PA">PA</option>
                            <option value="PB">PB</option>
                            <option value="PR">PR</option>
                            <option value="PE">PE</option>
                            <option value="PI">PI</option>
                            <option value="RJ">RJ</option>
                            <option value="RN">RN</option>
                            <option value="RS">RS</option>
                            <option value="RO">RO</option>
                            <option value="RR">RR</option>
                            <option value="SC">SC</option>
                            <option value="SP">SP</option>
                            <option value="SE">SE</option>
                            <option value="TO">TO</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td><label for="telefone">Telefone</label></td>
                    <td>
                        <input type="tel" id="telefone" name="telefone">
                    </td>

                    <td><label for="fax">Fax</label></td>
                    <td>
                        <input type="text" id="fax" name="fax">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="data-nascimento">Data Nascimento</label>
                    </td>
                    <td>
                        <input type="text" id="data-nascimento" name="data_nascimento">
                    </td>

                    <td>Sexo</td>
                    <td>
                        <input type="radio" id="masculino" name="sexo" value="M">
                        <label for="masculino" class="label-inline">M</label>

                        <input type="radio" id="feminino" name="sexo" value="F">
                        <label for="feminino" class="label-inline">F</label>
                    </td>
                </tr>

                <tr>
                    <td><label for="celular">Celular</label></td>
                    <td>
                        <input type="tel" id="celular" name="celular">
                    </td>

                    <td><label for="estado-civil">Est.Civil</label></td>
                    <td>
                        <select id="estado-civil" name="estado_civil">
                            <option value="solteiro">Solteiro</option>
                            <option value="casado">Casado</option>
                            <option value="viuvo">Viúvo</option>
                            <option value="divorciado">Divorciado</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td><label for="login">Login</label></td>
                    <td>
                        <input type="text" id="login" name="login">
                    </td>

                    <td><label for="senha">Senha</label></td>
                    <td>
                        <input type="password" id="senha" name="senha">
                    </td>
                </tr>
            </table>

            <section class="assuntos">
                <p>Deseja receber informações sobre os seguintes assuntos abaixo:</p>

                <p>
                    <input type="checkbox" id="tecnologia" name="assuntos" value="tecnologia">
                    <label for="tecnologia">Tecnologia</label>

                    <input type="checkbox" id="esportes" name="assuntos" value="esportes">
                    <label for="esportes">Esportes</label>

                    <input type="checkbox" id="automoveis" name="assuntos" value="automoveis">
                    <label for="automoveis">Automóveis</label>

                    <input type="checkbox" id="culinaria" name="assuntos" value="culinaria">
                    <label for="culinaria">Culinária</label>

                    <input type="checkbox" id="politica" name="assuntos" value="politica">
                    <label for="politica">Política</label>

                    <input type="checkbox" id="policial" name="assuntos" value="policial">
                    <label for="policial">Policial</label>

                    <input type="checkbox" id="tempo" name="assuntos" value="tempo">
                    <label for="tempo">Tempo</label>
                </p>

                <p>
                    <input type="checkbox" id="cultura" name="assuntos" value="cultura">
                    <label for="cultura">Cultura</label>

                    <input type="checkbox" id="economia" name="assuntos" value="economia">
                    <label for="economia">Economia</label>

                    <input type="checkbox" id="jogos" name="assuntos" value="jogos">
                    <label for="jogos">Jogos</label>

                    <input type="checkbox" id="educacao" name="assuntos" value="educacao">
                    <label for="educacao">Educação</label>

                    <input type="checkbox" id="viagem" name="assuntos" value="viagem">
                    <label for="viagem">Viagem</label>

                    <input type="checkbox" id="empregos" name="assuntos" value="empregos">
                    <label for="empregos">Empregos</label>

                    <input type="checkbox" id="moda" name="assuntos" value="moda">
                    <label for="moda">Moda e Estilo</label>
                </p>

                <p>
                    <input type="checkbox" id="regras" name="regras" value="aceito">
                    <label for="regras">Li as regras de cadastro e autorizo a criação do usuário</label>
                </p>
            </section>

            <section class="botoes">
                <button type="submit">Confirmar</button>
                <button type="reset">Retornar</button>
            </section>

        </form>
    </main>

</body>
</html>
